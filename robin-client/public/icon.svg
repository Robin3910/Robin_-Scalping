<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="100%" style="stop-color:#00d084"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <g transform="translate(56, 56)">
    <!-- Chart line going up -->
    <path d="M0,350 L80,280 L160,300 L240,180 L320,200 L400,80" 
          fill="none" stroke="url(#accent)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Grid dots -->
    <circle cx="80" cy="280" r="16" fill="#4a9eff"/>
    <circle cx="160" cy="300" r="16" fill="#4a9eff"/>
    <circle cx="240" cy="180" r="16" fill="#00d084"/>
    <circle cx="320" cy="200" r="16" fill="#00d084"/>
    <circle cx="400" cy="80" r="20" fill="#00d084"/>
    <!-- R letter -->
    <text x="340" y="400" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="#4a9eff" opacity="0.8">R</text>
  </g>
</svg>
